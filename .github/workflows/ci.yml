name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: philo
    steps:
      - uses: actions/checkout@v4

      - name: Build philo
        run: make

      - name: Check no unnecessary relink
        run: |
          status=0
          make -q philo || status=$?
          if [ "$status" -eq 1 ]; then
            echo "::error::Makefile rebuilds or relinks philo unexpectedly"
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Check clean rules
        run: |
          make clean
          if find . -maxdepth 1 -name '*.o' | grep -q .; then
            echo "::error::make clean did not remove object files"
            find . -maxdepth 1 -name '*.o'
            exit 1
          fi
          make
          make fclean
          if [ -e ./philo ]; then
            echo "::error::make fclean did not remove the binary"
            exit 1
          fi
          if find . -maxdepth 1 -name '*.o' | grep -q .; then
            echo "::error::make fclean did not remove object files"
            find . -maxdepth 1 -name '*.o'
            exit 1
          fi

  norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install norminette
        run: |
          python -m pip install --upgrade pip
          python -m pip install norminette==3.3.59

      - name: Run norminette
        run: norminette philo

  smoke:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: philo
    steps:
      - uses: actions/checkout@v4

      - name: Build philo
        run: make

      - name: Invalid invocation exits quickly
        run: |
          set +e
          timeout 2s ./philo >/tmp/philo_noargs.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 124 ]; then
            echo "::error::./philo without arguments should exit quickly"
            cat /tmp/philo_noargs.log
            exit 1
          fi
          if [ "$status" -ge 128 ]; then
            echo "::error::./philo crashed without arguments"
            cat /tmp/philo_noargs.log
            exit 1
          fi

      - name: Check argument validation
        run: |
          run_expect_fail() {
            name=$1
            shift

            set +e
            "$@" > "${name}.log" 2>&1
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              echo "::error::${name} unexpectedly succeeded"
              cat "${name}.log"
              exit 1
            fi
            if [ "$status" -ge 128 ]; then
              echo "::error::${name} crashed"
              cat "${name}.log"
              exit 1
            fi
            if ! grep -qx 'Error' "${name}.log"; then
              echo "::error::${name} did not print Error"
              cat "${name}.log"
              exit 1
            fi
          }

          run_expect_success() {
            name=$1
            shift

            set +e
            "$@" > "${name}.log" 2>&1
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "::error::${name} failed"
              cat "${name}.log"
              exit 1
            fi
            if [ -s "${name}.log" ]; then
              echo "::error::${name} unexpectedly wrote output"
              cat "${name}.log"
              exit 1
            fi
          }

          run_expect_success valid_basic ./philo 5 800 200 200
          run_expect_success valid_must_eat ./philo 5 800 200 200 7
          run_expect_fail invalid_zero ./philo 0 800 200 200
          run_expect_fail invalid_negative ./philo 5 -1 200 200

  valgrind:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: philo
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build philo
        run: make

      - name: Check leaks on current smoke cases
        run: |
          run_valgrind_case() {
            name=$1
            shift

            set +e
            timeout 5s valgrind --quiet \
              --leak-check=full \
              --show-leak-kinds=all \
              --errors-for-leak-kinds=all \
              --error-exitcode=42 \
              --log-file="${name}.vg.log" \
              "$@" > "${name}.out" 2>&1
            status=$?
            set -e

            if [ "$status" -eq 124 ]; then
              echo "::error::${name} timed out under valgrind"
              cat "${name}.out"
              cat "${name}.vg.log"
              exit 1
            fi
            if [ "$status" -ne 0 ]; then
              echo "::error::${name} failed under valgrind"
              cat "${name}.out"
              cat "${name}.vg.log"
              exit 1
            fi
            if [ -s "${name}.out" ]; then
              echo "::error::${name} unexpectedly wrote output"
              cat "${name}.out"
              exit 1
            fi
          }

          run_valgrind_case valid_basic ./philo 5 800 200 200
          run_valgrind_case valid_must_eat ./philo 5 800 200 200 7
