name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: philo
    steps:
      - uses: actions/checkout@v4

      - name: Build philo
        run: make

      - name: Check no unnecessary relink
        run: |
          status=0
          make -q philo || status=$?
          if [ "$status" -eq 1 ]; then
            echo "::error::Makefile rebuilds or relinks philo unexpectedly"
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Check clean rules
        run: |
          make clean
          if find . -maxdepth 1 -name '*.o' | grep -q .; then
            echo "::error::make clean did not remove object files"
            find . -maxdepth 1 -name '*.o'
            exit 1
          fi
          make
          make fclean
          if [ -e ./philo ]; then
            echo "::error::make fclean did not remove the binary"
            exit 1
          fi
          if find . -maxdepth 1 -name '*.o' | grep -q .; then
            echo "::error::make fclean did not remove object files"
            find . -maxdepth 1 -name '*.o'
            exit 1
          fi

  norminette:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install norminette
        run: |
          python -m pip install --upgrade pip
          python -m pip install norminette==3.3.59

      - name: Run norminette
        run: norminette philo

  smoke:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: philo
    steps:
      - uses: actions/checkout@v4

      - name: Build philo
        run: make

      - name: Invalid invocation exits quickly
        run: |
          set +e
          timeout 2s ./philo >/tmp/philo_noargs.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 124 ]; then
            echo "::error::./philo without arguments should exit quickly"
            cat /tmp/philo_noargs.log
            exit 1
          fi
          if [ "$status" -ge 128 ]; then
            echo "::error::./philo crashed without arguments"
            cat /tmp/philo_noargs.log
            exit 1
          fi

      - name: Run short simulations
        run: |
          validate_log() {
            log_file=$1
            if [ ! -s "$log_file" ]; then
              return 0
            fi
            if grep -Ev '^[0-9]+ [0-9]+ (has taken a fork|is eating|is sleeping|is thinking|died)$' "$log_file" > /dev/null; then
              echo "::error::Unexpected log format in $log_file"
              cat "$log_file"
              exit 1
            fi
          }

          run_case() {
            name=$1
            seconds=$2
            shift 2

            set +e
            timeout "${seconds}s" "$@" > "${name}.log" 2>&1
            status=$?
            set -e

            if [ "$status" -eq 124 ]; then
              echo "::error::${name} timed out"
              cat "${name}.log"
              exit 1
            fi
            if [ "$status" -ge 128 ]; then
              echo "::error::${name} crashed"
              cat "${name}.log"
              exit 1
            fi
            validate_log "${name}.log"
          }

          run_case one_philo 3 ./philo 1 200 100 100
          run_case must_eat 3 ./philo 2 400 100 100 1
